<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Login</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0b1020;
        color: #e6e9f2;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        width: min(420px, 92vw);
        background: #141a2e;
        border: 1px solid #2a3356;
        border-radius: 12px;
        padding: 24px;
      }
      h1 {
        margin: 0 0 16px;
        font-size: 22px;
      }
      p {
        margin: 0 0 20px;
        color: #aeb6d5;
      }
      label {
        display: block;
        margin: 0 0 8px;
        font-size: 14px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        background: #0f1427;
        color: #e6e9f2;
        border: 1px solid #2a3356;
        border-radius: 8px;
        padding: 10px 12px;
        margin: 0 0 14px;
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        background: #4c8dff;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      .hint {
        margin-top: 12px;
        font-size: 12px;
        color: #8f99c0;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Admin Login</h1>
      <p>This is the real static page for <code>/admin/login</code>.</p>
      <form action="/admin" method="get">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="username" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />

        <button type="submit">Sign in</button>
      </form>
      <div class="hint">Route served from: <code>admin/login/index.html</code></div>
    </main>
  </body>
</html>
